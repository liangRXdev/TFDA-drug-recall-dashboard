name: Update Data
on:
  schedule:
    - cron: '0 20 * * *' # UTC 20:00 (台灣時間凌晨 4:00)
  workflow_dispatch:
jobs:
  update-data:
    runs-on: ubuntu-latest
    steps:
      # DA-05：Actions 固定到完整 commit SHA（旁註對應 tag），避免可移動的 major tag 供應鏈風險
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: '3.10'
      - name: Install dependencies
        run: pip install requests==2.32.3 # DA-04：鎖定版本以確保可重現
      - name: Run Scraper
        run: python scraper.py
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add data/data.json data/status.json
          git commit -m "Auto-update recall data [skip ci]" || exit 0
          git push
