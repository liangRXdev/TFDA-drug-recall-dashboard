<html lang="zh-TW">
<head>

    <title>台灣藥品回收監測看板</title>
    <meta name="theme-color" content="#dc2626">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="藥品回收">
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icons/icon-192.png">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;600;700&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">

<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect x='10' y='35' width='80' height='30' rx='15' fill='%237B5EA7'/><rect x='10' y='35' width='40' height='30' rx='15' fill='%23FFFFFF' opacity='0.4'/></svg>">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/1.13.6/css/jquery.dataTables.min.css">
    <link rel="stylesheet" type="text/css" href="https://cdn.datatables.net/responsive/2.5.0/css/responsive.dataTables.min.css">

    <style>
        :root {
            --bg: #eef1f6;
            --surface: #ffffff;
            --surface2: #f4f6fa;
            --border: #e2e6ef;
            --border-light: #edf0f7;
            --text: #1a2035;
            --text-dim: #6b7a99;
            --text-muted: #b0bcd4;
            --blue: #3b82f6;
            --blue-soft: #eff6ff;
            --blue-border: #bfdbfe;
            --red: #ef4444;
            --red-soft: #fef2f2;
            --red-border: #fecaca;
            --amber: #d97706;
            --amber-soft: #fffbeb;
            --amber-border: #fde68a;
            --green: #16a34a;
            --green-soft: #f0fdf4;
            --green-border: #bbf7d0;
            --sans: 'Noto Sans TC', sans-serif;
            --mono: 'DM Mono', monospace;
            --radius: 12px;
            --shadow: 0 1px 3px rgba(15,23,42,0.06), 0 1px 2px rgba(15,23,42,0.04);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            background: var(--bg); color: var(--text); font-family: var(--sans);
            min-height: 100vh; font-size: 14px; display: flex; flex-direction: column;
        }

        /* ─── Top Nav ─── */
        .top-nav { background: var(--surface); border-bottom: 1px solid var(--border); position: sticky; top: 0; z-index: 100; box-shadow: var(--shadow); }
        .nav-inner { max-width: 1280px; margin: 0 auto; padding: 0 28px; height: 68px; display: flex; align-items: center; gap: 20px; }
        .brand { display: flex; align-items: center; gap: 12px; flex-shrink: 0; }
        .brand-icon { width: 36px; height: 36px; border-radius: 8px; background: var(--blue-soft); border: 1px solid var(--blue-border); display: flex; align-items: center; justify-content: center; font-size: 16px; }
        .brand-text h1 { font-size: 16px; font-weight: 700; color: var(--text); letter-spacing: -0.01em; line-height: 1.2; }
        .brand-text p { font-family: var(--mono); font-size: 10px; color: var(--text-muted); letter-spacing: 0.06em; text-transform: uppercase; margin-top: 1px; }
        .nav-divider { width: 1px; height: 28px; background: var(--border); flex-shrink: 0; }
        .nav-stats { display: flex; align-items: center; gap: 8px; flex: 1; }
        .stat-pill { display: inline-flex; align-items: center; gap: 7px; padding: 6px 14px; border-radius: 100px; font-size: 13px; font-weight: 500; border: 1px solid; cursor: default; }
        .stat-pill .dot { width: 7px; height: 7px; border-radius: 50%; flex-shrink: 0; }
        .stat-pill.red   { background: var(--red-soft);   color: var(--red);   border-color: var(--red-border); }
        .stat-pill.amber { background: var(--amber-soft);  color: var(--amber); border-color: var(--amber-border); }
        .stat-pill.blue  { background: var(--blue-soft);   color: var(--blue);  border-color: var(--blue-border); }
        .stat-pill.green { background: var(--green-soft);  color: var(--green); border-color: var(--green-border); }
        .stat-pill.red   .dot { background: var(--red); }
        .stat-pill.amber .dot { background: var(--amber); animation: pulse 2s infinite; }
        .stat-pill.blue  .dot { background: var(--blue); }
        .stat-pill.green .dot { background: var(--green); }
        @keyframes pulse { 0%, 100% { opacity:1; transform:scale(1); } 50% { opacity:.5; transform:scale(.8); } }
        
        .nav-search { margin-left: auto; position: relative; flex-shrink: 0; }
        .nav-search input { width: 280px; padding: 8px 14px 8px 36px; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; font-family: var(--sans); font-size: 13px; color: var(--text); outline: none; }
        .nav-search input::placeholder { color: var(--text-muted); }
        .nav-search input:focus { border-color: var(--blue); box-shadow: 0 0 0 3px rgba(59,130,246,0.12); background: var(--surface); }
        .nav-search input:disabled { background: #f0f2f5; cursor: not-allowed; opacity: 0.6; }
        .search-icon { position: absolute; left: 11px; top: 50%; transform: translateY(-50%); color: var(--text-muted); font-size: 13px; pointer-events: none; }

        /* ─── Shell & Layout ─── */
        .shell { max-width: 1280px; width: 100%; margin: 0 auto; padding: 28px 28px 40px; flex: 1; }
        .section-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }
        .section-title { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 600; color: var(--text); }
        .section-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--blue); }
        .section-badge { font-family: var(--mono); font-size: 11px; padding: 3px 10px; border-radius: 100px; background: var(--surface2); border: 1px solid var(--border); color: var(--text-dim); }
        .live-tag { font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.12em; padding: 5px 12px; border-radius: 6px; background: var(--blue-soft); color: var(--blue); border: 1px solid var(--blue-border); }
        .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); box-shadow: var(--shadow); overflow: hidden; width: 100%; }

        /* ─── 自訂篩選列 (Filter Bar) ─── */
        .filter-bar {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 12px 20px;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 14px;
            box-shadow: var(--shadow);
            flex-wrap: wrap;
        }
        .filter-select {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 7px 12px;
            font-family: var(--sans);
            font-size: 13px;
            color: var(--text);
            outline: none;
            cursor: pointer;
            transition: all 0.15s;
        }
        .filter-select:hover { border-color: var(--text-muted); }
        .filter-select:focus { border-color: var(--blue); box-shadow: 0 0 0 2px rgba(59,130,246,0.1); }
        .filter-select:disabled { background: var(--surface2); color: var(--text-muted); cursor: not-allowed; border-color: var(--border-light); }

        .filter-divider { width: 1px; height: 24px; background: var(--border); margin: 0 4px; }

        .filter-checkbox-label {
            display: flex; align-items: center; gap: 6px; font-size: 13.5px;
            color: var(--blue); font-weight: 600; cursor: pointer; user-select: none;
        }
        .filter-checkbox-label input[type="checkbox"] { width: 15px; height: 15px; cursor: pointer; accent-color: var(--blue); }

        /* ─── DataTable Overrides ─── */
        #recallTable_wrapper { padding: 0 16px 16px; } /* 頂部 padding 設 0，因為已有 Filter bar */
        #recallTable { border-collapse: separate !important; border-spacing: 0 !important; width: 100% !important; margin-top: 0 !important;}
        #recallTable thead th { background: var(--surface2); color: var(--text-dim); font-family: var(--mono); font-size: 10px; letter-spacing: 0.1em; text-transform: uppercase; padding: 10px 14px; border: none !important; border-bottom: 1px solid var(--border) !important; white-space: nowrap; }
        #recallTable tbody tr { transition: background 0.1s; }
        #recallTable tbody tr:hover td { background: var(--blue-soft) !important; }
        #recallTable tbody td { border: none !important; border-bottom: 1px solid var(--border-light) !important; padding: 12px 14px; font-size: 13.5px; color: var(--text); vertical-align: middle; background: transparent; }

        .date-cell { font-family: var(--mono); font-size: 12px; color: var(--text-dim); white-space: nowrap; }
        .product-name { font-weight: 600; color: var(--text); display: block; }
        .meta-text { display: block; font-family: var(--mono); font-size: 11.5px; color: var(--text-muted); margin-top: 4px; }
        .batch-cell { font-family: var(--mono); font-size: 12px; color: var(--text); word-break: break-all; white-space: normal !important; min-width: 120px; line-height: 1.4; }
        .reason-text { font-size: 12.5px; color: var(--text-dim); line-height: 1.5; }

        .badge-grade { display: inline-flex; align-items: center; font-family: var(--mono); font-size: 10px; font-weight: 500; letter-spacing: 0.05em; padding: 3px 9px; border-radius: 100px; white-space: nowrap; border: 1px solid; }
        .badge-danger  { background: var(--red-soft);   color: var(--red);   border-color: var(--red-border); }
        .badge-warning { background: var(--amber-soft);  color: var(--amber); border-color: var(--amber-border); }
        .badge-info    { background: var(--blue-soft);   color: var(--blue);  border-color: var(--blue-border); }
        .badge-muted   { background: var(--surface2);    color: var(--text-dim); border-color: var(--border); }

        .dataTables_paginate { margin-top: 15px; text-align: center; }
        .paginate_button { color: var(--text-dim) !important; border: 1px solid var(--border) !important; border-radius: 6px !important; padding: 4px 10px !important; margin: 0 2px !important; font-size: 12.5px; background: var(--surface) !important; cursor: pointer; }
        .paginate_button:hover { background: var(--blue-soft) !important; color: var(--blue) !important; border-color: var(--blue-border) !important; }
        .paginate_button.current { background: var(--blue) !important; color: #fff !important; border-color: var(--blue) !important; font-weight: 600; }

        .skel { height: 13px; border-radius: 4px; background: linear-gradient(90deg, var(--border) 25%, var(--border-light) 50%, var(--border) 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
        @keyframes shimmer { 0% { background-position: 200% 0; } 100% { background-position: -200% 0; } }
        ::-webkit-scrollbar { width: 5px; height: 5px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

        /* ─── PWA Banners ─── */
        .pwa-banner {
            display: none; padding: 0.55rem 1.5rem;
            font-size: 0.82rem; align-items: center;
            justify-content: center; gap: 0.875rem; flex-wrap: wrap;
            text-align: center; line-height: 1.5;
        }
        /* 離線 banner：比一般 app 更顯眼，因為快取回收資料有安全疑慮 */
        #offlineBanner {
            background: #fef2f2;
            border-bottom: 2px solid #fca5a5;
            color: #991b1b;
            font-weight: 500;
        }
        #updateBanner {
            background: var(--blue-soft);
            border-bottom: 1px solid var(--blue-border);
            color: #1e40af;
        }
        #installBanner {
            background: #f0fdf4;
            border-bottom: 1px solid #bbf7d0;
            color: #166534;
        }
        .pwa-action-btn {
            padding: 0.3rem 0.75rem; border: none; border-radius: 4px;
            font-size: 0.8rem; font-weight: 600; cursor: pointer; font-family: var(--sans);
        }
        .pwa-reload-btn  { background: var(--blue); color: white; }
        .pwa-reload-btn:hover { background: #1d4ed8; }
        .pwa-install-btn { background: var(--green); color: white; }
        .pwa-install-btn:hover { background: #15803d; }
        .pwa-dismiss-btn { background: none; color: inherit; opacity: 0.55; padding: 0.2rem 0.4rem; font-size: 0.95rem; }

        /* ─── 頁尾警語樣式 ─── */
        .site-footer { text-align: center; padding: 0 28px 40px; color: var(--text-dim); font-size: 12px; line-height: 1.6; }
        .site-footer a { color: var(--blue); text-decoration: none; font-weight: 500; transition: color 0.15s; }
        .site-footer a:hover { color: #1d4ed8; text-decoration: underline; }

/* ─── 手機端視區嚴格控制 ─── */
        @media (max-width: 768px) {
            html, body { overflow-x: hidden; width: 100vw; }
            
            /* 導航列改為垂直堆疊，並重新排序 */
            .nav-inner { flex-direction: column; align-items: flex-start; height: auto; padding: 12px 16px; gap: 10px; }
            .brand { width: 100%; }
            .nav-divider { display: none; }
            
            /* 搜尋列權重提升至第二層 */
            .nav-search { width: 100%; order: 2; }
            .nav-search input { width: 100%; }
            
            /* 統計標籤降至第三層，並強制縮小尺寸 */
            .nav-stats { width: 100%; order: 3; justify-content: flex-start; flex-wrap: wrap; gap: 6px; overflow-x: visible; padding-bottom: 0; }
            .stat-pill { padding: 4px 8px; font-size: 11px; }
            .stat-pill .dot { width: 5px; height: 5px; }

            .shell { padding: 16px 12px 24px; width: 100%; box-sizing: border-box; }
            .filter-bar { padding: 12px; gap: 10px; }
            .filter-select { flex: 1 1 calc(50% - 5px); min-width: 130px; }
            .filter-divider { display: none; }
            .filter-checkbox-label { width: 100%; justify-content: flex-end; margin-top: 4px; }
            .site-footer { padding: 0 16px 32px; font-size: 11.5px; }
            .card { width: 100%; max-width: 100vw; }
            #recallTable { width: 100% !important; }
            #recallTable th, #recallTable td { word-wrap: break-word; white-space: normal; }
            #recallTable_paginate { display: flex; flex-wrap: wrap; justify-content: center; gap: 4px; margin-top: 16px; padding: 0 10px; }
        }
    </style>
</head>

<script>
// ── 分級正規化（純函式）─────────────────────────────────────────────
// TFDA 原始「回收分級」格式雜亂：'第二級'、'2'、'第2級'、尾端空白、null、
// '疑似第一級'、'-' 等皆存在。統一映射為確定等級，未知/疑似不默認第二級，
// 改標「未確認」並排除於確定分級 KPI。原始值以 title 保留供追溯。
// 回傳：{ level: 1|2|3|null, label: '第一級'|'第二級'|'第三級'|'未確認', badge, raw }
function normalizeGrade(raw) {
    const s = (raw == null ? '' : String(raw)).trim();
    if (s === '') return { level: null, label: '未確認', badge: 'badge-muted', raw };
    // 「疑似」不列入確定分級，避免嚴重度被高估或低估
    if (s.includes('疑似')) return { level: null, label: '未確認', badge: 'badge-muted', raw };
    if (s.includes('一') || s.includes('1')) return { level: 1, label: '第一級', badge: 'badge-danger', raw };
    if (s.includes('二') || s.includes('2')) return { level: 2, label: '第二級', badge: 'badge-warning', raw };
    if (s.includes('三') || s.includes('3')) return { level: 3, label: '第三級', badge: 'badge-info', raw };
    return { level: null, label: '未確認', badge: 'badge-muted', raw };
}

// HTML 跳脫（同時涵蓋文字內容與屬性值，避免上游被污染資料經 innerHTML 注入 — CR-10）
function escHtml(v) {
    return String(v == null ? '' : v)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
        .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
}
const escAttr = escHtml; // 語意別名：屬性值跳脫

// 取資料集中最新公告日期（YYYY/MM/DD 字串比較即可，格式為零填補故可字典序）；無回 ''
function maxAnnouncementDate(data) {
    let max = '';
    for (const item of data) {
        const d = (item && item.日期) || '';
        if (/^\d{4}\/\d{2}\/\d{2}$/.test(d) && d > max) max = d;
    }
    return max;
}

// 目前已載入資料的簽章（筆數+最新公告日期），供前景更新偵測比對（CR-08）
let loadedSignature = null;
let deployLastModified = null;

// TG-03：?selftest=1 時以 console.assert 驗證 normalizeGrade（無需測試框架）
if (new URLSearchParams(location.search).get('selftest') === '1') {
    const t = (raw, level, label) => {
        const g = normalizeGrade(raw);
        console.assert(g.level === level && g.label === label,
            'normalizeGrade 失敗:', JSON.stringify(raw), '→', g);
    };
    t('第一級', 1, '第一級'); t('1', 1, '第一級');
    t('第二級', 2, '第二級'); t('第二級 ', 2, '第二級'); t('2', 2, '第二級');
    t('2 ', 2, '第二級'); t('二', 2, '第二級'); t('第2級', 2, '第二級');
    t('第三級', 3, '第三級'); t('3', 3, '第三級'); t('3 ', 3, '第三級');
    t('疑似第一級', null, '未確認'); t(null, null, '未確認');
    t('', null, '未確認'); t('-', null, '未確認');
    console.log('[selftest] normalizeGrade 測例執行完畢');
}

// 加入時間戳參數 (Cache-Busting) 強制瀏覽器抓取最新檔案
fetch('data/data.json?t=' + new Date().getTime(), { cache: 'no-store' })
    .then(r => {
        // CR-11：先驗證 HTTP 狀態，未成功（含 SW 回傳的 503）即拋錯進 .catch，
        // 不在資料未確認前搶先標示「已更新」。保留檔案部署時間供後續標示。
        if (!r.ok) throw new Error('HTTP ' + r.status);
        deployLastModified = r.headers.get('Last-Modified');
        return r.json();
    })
    .then(data => {
        // CR-11：根節點必須是陣列，否則視為資料損壞
        if (!Array.isArray(data)) throw new Error('資料格式非陣列');

        // CR-05：區分「最新公告日期」(來自資料內容，真正的新鮮度) 與
        // 「檔案部署時間」(HTTP Last-Modified，僅代表檔案何時被部署)
        const latestDate = maxAnnouncementDate(data);
        const deployText = deployLastModified
            ? new Date(deployLastModified).toLocaleString('zh-TW', { hour12: false })
            : '未知';
        document.getElementById('updateTime').textContent =
            `(最新公告 ${latestDate || '未知'} · 檔案部署 ${deployText})`;
        loadedSignature = data.length + '|' + latestDate;

        // ... (下方原有的 let class1 = 0, class2 = 0; 等邏輯維持不變)
        let class1 = 0, class2 = 0, class3 = 0;
        const yearsSet = new Set();

        // 統計運算與提取年份（依正規化等級計數，未確認不計入任一確定級別）
        data.forEach(item => {
            const level = normalizeGrade(item.回收分級).level;
            if (level === 1) class1++;
            else if (level === 2) class2++;
            else if (level === 3) class3++;

            const dateStr = item.日期 || '';
            if (dateStr) {
                const year = dateStr.split('/')[0];
                if (year && year.length === 4) yearsSet.add(year);
            }
        });

        // 填充年份下拉選單
        const yearSelect = document.getElementById('filterYear');
        [...yearsSet].sort((a,b) => b - a).forEach(y => {
            yearSelect.innerHTML += `<option value="${y}">年份：${y}</option>`;
        });

        // 更新頂部標籤
        document.getElementById('pill-total').textContent = data.length;
        document.getElementById('pill-class1').textContent = class1;
        document.getElementById('pill-class2').textContent = class2;
        document.getElementById('pill-class3').textContent = class3;
        // 【此處的 totalBadge 賦值程式碼已刪除】
        
        // 動態更新「狀態：全部」的總數顯示
        document.querySelector('#filterGrade option[value=""]').textContent = `狀態：全部 (${data.length})`;
        
        // 構建表格 HTML
        let rows = '';
        data.forEach(item => {
            const g = normalizeGrade(item.回收分級);
            // CR-10：所有上游欄位一律 escHtml，防止被污染資料經 innerHTML 執行 script／偽造分級
            const licenseNo = escHtml(item.許可證字號 || '未註明字號');
            const holder = escHtml(item.許可證持有者 || '未知藥廠');
            const batchNo = escHtml(item.批號 || '未註明批號');
            const dateStr = escHtml(item.日期 || '');
            const product = escHtml(item.產品 || '');
            const reason = escHtml(item.原因 || '');

            rows += `<tr>
                <td class="date-cell">${dateStr}</td>
                <td><span class="badge-grade ${g.badge}" title="原始分級值：${escAttr(g.raw)}">${g.label}</span></td>
                <td>
                    <span class="product-name">${product}</span>
                    <span class="meta-text">${holder} | ${licenseNo}</span>
                </td>
                <td class="batch-cell">${batchNo}</td>
                <td><span class="reason-text">${reason}</span></td>
            </tr>`;
        });
        document.getElementById('tableBody').innerHTML = rows;

        // 初始化 DataTables
        const dt = $('#recallTable').DataTable({
            responsive: true,
            order: [[0, 'desc']],
            pageLength: 10,
            dom: 'rtp', // 僅保留 Table(t) 與 Pagination(p)
            language: { paginate: { previous: '上一頁', next: '下一頁' }, zeroRecords: '查無符合條件之資料' },
            columnDefs: [
                { responsivePriority: 1, targets: 2, width: '40%' }, 
                { responsivePriority: 2, targets: 0, width: '15%' }, 
                { responsivePriority: 3, targets: 1, width: '10%' }  
            ]
        });

        // 核心邏輯：DataTables 自訂多條件過濾器
        $.fn.dataTable.ext.search.push(function(settings, searchData, index, rowData, counter) {
            // 若為 Top10 模式，由其它邏輯接管，這裡直接放行
            if ($('#filterTop10').is(':checked')) return true;

            const gradeFilter = $('#filterGrade').val();
            const yearFilter = $('#filterYear').val();
            const monthFilter = $('#filterMonth').val();

            const dateStr = searchData[0] || '';
            const gradeStr = searchData[1] || '';

            let matchGrade = (gradeFilter === "") || gradeStr.includes(gradeFilter);
            let matchYear = true;
            let matchMonth = true;

            if (dateStr) {
                const parts = dateStr.split('/');
                if (yearFilter !== "" && parts[0] !== yearFilter) matchYear = false;
                if (monthFilter !== "" && parts[1] !== monthFilter) matchMonth = false;
            } else {
                if (yearFilter !== "" || monthFilter !== "") matchYear = false;
            }

            return matchGrade && matchYear && matchMonth;
        });

        // 事件綁定：全域文字搜尋
        $('#globalSearch').on('input', function() {
            dt.search(this.value).draw();
        });

        // 事件綁定：下拉選單變更
        $('.filter-select:not(#filterSort)').on('change', function() {
            dt.draw();
        });

        // 事件綁定：排序變更
        $('#filterSort').on('change', function() {
            dt.order([0, $(this).val()]).draw();
        });

        // 事件綁定：強制顯示最新十筆
        $('#filterTop10').on('change', function() {
            const isChecked = $(this).is(':checked');
            
            if (isChecked) {
                // 1. 重置所有輸入與選項
                $('#filterGrade, #filterYear, #filterMonth').val('');
                $('#filterSort').val('desc');
                $('#globalSearch').val('');
                
                // 2. 鎖定表單控制項
                $('.filter-select, #globalSearch').prop('disabled', true);
                
                // 3. 隱藏底部分頁器
                $('.dataTables_paginate').hide();
                
                // 4. 強制排序最新並清除文字過濾
                dt.search('').order([0, 'desc']).draw();
            } else {
                // 1. 解除鎖定
                $('.filter-select, #globalSearch').prop('disabled', false);
                
                // 2. 恢復底部分頁器
                $('.dataTables_paginate').show();
                
                // 3. 重新觸發一次篩選邏輯
                dt.draw();
            }
        });

    })
    .catch(err => {
        console.error('資料載入失敗:', err);
        // CR-06/CR-11：載入或驗證失敗（含離線且無快取時 SW 回傳的 503）→ 明確阻斷式錯誤，
        // 不呈現任何可能被誤讀為「目前無回收品項」的成功狀態
        const liveTag = document.querySelector('.live-tag');
        if (liveTag) {
            liveTag.textContent = 'ERROR';
            liveTag.style.background = 'var(--red-soft)';
            liveTag.style.color = 'var(--red)';
            liveTag.style.borderColor = 'var(--red-border)';
        }
        document.getElementById('updateTime').textContent = '(資料無法載入)';
        document.getElementById('tableBody').innerHTML =
            `<tr><td colspan="5" style="text-align:center;padding:48px;color:var(--red);font-size:13px;line-height:1.6;">
                ⚠ 無法取得回收資料（可能離線且無本機快取）。<br>
                此為載入失敗，<strong>並非「目前無回收品項」</strong>；請恢復連線後重試，切勿據此做盤點決策。</td></tr>`;
    });

// ── PWA：Service Worker ─────────────────────────────────────────
if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('./sw.js').then(reg => {
        // 注意：updatefound 僅在 sw.js「本身內容」變更時觸發；單獨更新 data/data.json
        // 不會安裝新 SW。資料更新的偵測改由下方 checkForDataUpdate() 前景比對處理（CR-08）。
        reg.addEventListener('updatefound', () => {
            const incoming = reg.installing;
            incoming.addEventListener('statechange', () => {
                if (incoming.state === 'installed' && navigator.serviceWorker.controller) {
                    document.getElementById('updateBanner').style.display = 'flex';
                }
            });
        });
    }).catch(err => console.warn('SW 註冊失敗:', err));

    // 離線模式通知：SW 無法取得最新資料時發送
    navigator.serviceWorker.addEventListener('message', e => {
        if (e.data?.type === 'OFFLINE_MODE') {
            document.getElementById('offlineBanner').style.display = 'flex';
            // 將 LIVE 標籤改為 CACHE，提醒使用者非即時資料
            const liveTag = document.querySelector('.live-tag');
            if (liveTag) {
                liveTag.textContent = 'CACHE';
                liveTag.style.background = 'var(--amber-soft)';
                liveTag.style.color = 'var(--amber)';
                liveTag.style.borderColor = 'var(--amber-border)';
            }
        }
    });
}

// ── PWA：離線 / 上線狀態即時偵測 ───────────────────────────────
window.addEventListener('offline', () => {
    document.getElementById('offlineBanner').style.display = 'flex';
});
// CR-07：'online' 只代表偵測到網路，不代表 data.json 已成功更新。
// 必須實際重抓並驗證成功，才重新載入以完整重繪；失敗則保留離線警示。
window.addEventListener('online', async () => {
    try {
        const r = await fetch('data/data.json?t=' + Date.now(), { cache: 'no-store' });
        if (!r.ok) throw new Error('HTTP ' + r.status);
        const d = await r.json();
        if (!Array.isArray(d)) throw new Error('資料格式非陣列');
        // 確認能取得有效最新資料 → 重新載入（避免就地重繪造成 DataTables/過濾器重複註冊）
        location.reload();
    } catch (e) {
        console.warn('上線後重抓失敗，維持快取警示:', e);
    }
});

// ── CR-08：前景資料更新偵測 ──────────────────────────────────────
// 不依賴 SW lifecycle。頁面重新可見或定時重抓 data.json，比對簽章（筆數+最新公告日期），
// 有變化即顯示更新 banner，讓長時間開啟的看板也能得知新公告。
async function checkForDataUpdate() {
    if (document.hidden || !loadedSignature) return;
    try {
        const r = await fetch('data/data.json?t=' + Date.now(), { cache: 'no-store' });
        if (!r.ok) return;
        const d = await r.json();
        if (!Array.isArray(d)) return;
        const sig = d.length + '|' + maxAnnouncementDate(d);
        if (sig !== loadedSignature) {
            document.getElementById('updateBanner').style.display = 'flex';
        }
    } catch { /* 靜默，下次再試 */ }
}
document.addEventListener('visibilitychange', () => { if (!document.hidden) checkForDataUpdate(); });
setInterval(checkForDataUpdate, 30 * 60 * 1000); // 每 30 分鐘

// ── PWA：版本更新 banner ────────────────────────────────────────
document.getElementById('reloadBtn').addEventListener('click', () => window.location.reload());
document.getElementById('dismissUpdateBtn').addEventListener('click', () => {
    document.getElementById('updateBanner').style.display = 'none';
});

// ── PWA：安裝 banner ────────────────────────────────────────────
let deferredInstallPrompt = null;
window.addEventListener('beforeinstallprompt', e => {
    e.preventDefault();
    deferredInstallPrompt = e;
    document.getElementById('installBanner').style.display = 'flex';
});

document.getElementById('installBtn').addEventListener('click', () => {
    if (!deferredInstallPrompt) return;
    deferredInstallPrompt.prompt();
    deferredInstallPrompt.userChoice.then(() => {
        deferredInstallPrompt = null;
        document.getElementById('installBanner').style.display = 'none';
    });
});

document.getElementById('dismissInstallBtn').addEventListener('click', () => {
    document.getElementById('installBanner').style.display = 'none';
});

window.addEventListener('appinstalled', () => {
    document.getElementById('installBanner').style.display = 'none';
    deferredInstallPrompt = null;
});
</script>
</body>
</html>
